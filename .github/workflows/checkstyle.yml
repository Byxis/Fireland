name: Checkstyle Test

on:
  pull_request:
    branches:
      - master

jobs:
  checkstyle:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 20
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '20'

    - name: Install Maven dependencies
      run: mvn install -DskipTests

    - name: Run Checkstyle
      run: mvn checkstyle:check
