  34224570-6da8-423f-944d-5c0b24c4e241:
    '1':
      ==: org.bukkit.inventory.ItemStack
      v: 3337
      type: WRITTEN_BOOK
      meta:
        ==: ItemMeta
        meta-type: BOOK_SIGNED
        title: Journal de bord
        author: Euphare13
        pages:
        - '{"text":"Jour 513\n\nCa fait longtemps que je n''ai pas vu un infecté.
          Il faut dire qu''avec ma blessure, je ne risque pas d''en revoir avant longtemps...
          Le médecin m''a dit que c''était en bonne voie, mais que je devais encore
          me reposer."}'
        - '{"text":"Jour 517\n\nIl y a eu une dispute aujourd''hui, entre l''épicier
          et un soldat. Il croyait que parce que une brigade était dehors, il aurait
          une meilleure ration. C''est un bleu, après tout. J''étais comme lui, à
          l''époque. Maintenant je m''y suis habitué."}'
        - '{"text":"Jour 520\n\nRien à dire. Eh oui, il y a des jours comme ça..."}'
        - '{"text":"Jour 522\n\nMa visite chez le médecin s''est bien passée. Il m''a
          dit que je pourrais peut-être sortir dans deux ou trois semaines. En tout
          cas, j''espère pouvoir resortir un jour. J''ai pas envie de finir dans un
          bureau..."}'
        - '{"text":"Jour 531\n\nJ''ai même pas eu le temps d''écrire cette semaine.
          Mais avec l''attaque de mardi et les travaux, c''est compréhensible. Certains
          ont bien cru qu''ils allaient y passer. On a failli mal finir, mardi. Mais
          ça va, on s''en est bien sorti..."}'
        - '{"text":"Jour 535\n\nJ''ai été voir le médecin, je resors dans trois jours.
          Je suis tellement excité !\nIl paraît que depuis ma dernière sortie, certains
          infectés ont mutés dans une espèce dont on ne sait juste qu''ils sentent
          encore plus mauvais."}'
        - '{"text":"Jour 538\n\nEt voilà, c''est le grand jour. Pour ma première (re)sortie,
          je vais au port. J''ai préparé mon équipement hier. On devrait être rentré
          avant le coucher du soleil."}'
        - '{"text":"Jour 540\n\nCa aura duré plus longtemps que prévu. Mais le principal,
          c''est que nous sommes tous en vie. Il y a un 2ème classe qui est tombé
          pendant l''expédition, mais il a rien à part des égratinures."}'
        - '{"text":"Jour 543\n\nLe refuge a prévu de repartir au port. L''objectif
          officiel est \"Reconnaissance\" mais on a déjà tout fouillé... Je ne sais
          pas ce qu''ils trafiquent, mais ça sent pas bon pour nous."}'
        - '{"text":"Jour 544\n\nLe chef du Camp m''a convoqué. A ce qui paraît c''est
          important."}'
        - '{"text":"Jour 545\n\nQuelle mission ! Me demander d''aller au continent,
          moi ? Pourquoi moi ? Je suis un ancien, mais je suis pas le seul... Le pire
          c''est qu''on me fournit quasiment rien, je dois tout trouver moi même.\nJe
          vais trouver où un bateau ??"}'
        - '{"text":"Jour 549\n\nJ''ai mené quelques investigations. J''ai entendu
          parler d''un petit port de pêche de l''autre côté de l''île. Personne sait
          si il y a encore un bateau là-bas. Je vais essayer d''aller voir."}'
        - '{"text":"Jour 541\n\nJe suis allé au port, il reste un bateau. Mais il
          est en sale état. Ca va me prendre au moins une semaine pour le réparer.
          En espérant qu''il flotte encore."}'
        - '{"text":"Jour 546\n\nLa réparation est en bonne voie. Je l''ai pas encore
          testé, mais je pense qu''il tiendra."}'
        - '{"text":"Jour 550\n\nDans deux jours, je pars. J''ai presque réuni tout
          ce dont j''avais besoin : armes, éclairage, le bateau (évidemment), provisions...
          Je devrais pouvoir tenir huit jours sur le continent. La base militaire
          serait à quatre jours d''ici."}'
        - '{"text":"Jour 552\n\nTout le monde me dit au revoir. Mais ce n''est pas
          un au revoir habituel, ça sonne plus comme un adieu. Peut-être qu''ils croient
          que c''est une mission suicide, que je ne reviendrai jamais. C''est possible.
          Je n''en sais rien."}'
        - '{"text":"Jour 553\n\nLa traversée se passe plutôt bien. Le vent est dans
          le bon sens donc pas besoin de beaucoup pagayer."}'
        - '{"text":"Jour 554\n\nMe voila arrivé sur le continent. Je suis dans une
          sorte de petite ville. Les infectés restent à peu près comme ceux qu''on
          peut trouver sur l''île. Sauf un. Il est beaucoup plus gros et a l''air
          beaucoup plus agressif."}'
        - '{"text":"Jour 555\n\nJ''ai failli croiser le monstre. J''ai dû sauter dans
          les égouts pour qu''il ne me voie pas. Heureusement que j''ai pris une bonne
          lampe !"}'
        - '{"text":"Jour 556\n\nJe suis plus très loin de la base militaire. J''ai
          vu passer un hélicoptère au-dessus de moi il y a quelques heures."}'
        - '{"text":"Jour 557\n\nJe pensais pas qu''autant d''obstacles pouvaient exister.
          Maintenant je vois la base. Ca devrait bien se passer désormais."}'
        - '{"text":"\n\nHanz Schwanenlaut\nfut tué en s''approchant de la base militaire.
          Les gardes n''ayant pas reçu l''information depuis l''île, il fut abattu
          d''une balle dans la tête.\n\n"}'
        resolved: true
        generation: 0
