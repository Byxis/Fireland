name: Static Analysis (SpotBugs & PMD)

on:
  pull_request:
    branches:
      - master

jobs:
  static-analysis:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up JDK 20
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '20'

    - name: Install Maven dependencies
      run: mvn install -DskipTests -B -ntp

    - name: Run SpotBugs
      run: mvn spotbugs:spotbugs -DskipTests

    - name: Run PMD
      run: mvn pmd:pmd -DskipTests

    - name: Display SpotBugs Report
      run: |
        echo "SpotBugs Report:"
        xmllint --format target/spotbugsXml.xml --xpath '//BugInstance' | grep -E 'type|message'

    - name: Display PMD Report
      run: |
        echo "PMD Report:"
        grep -E 'violation|error' target/pmd.xml
